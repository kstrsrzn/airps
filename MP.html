<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表情辨識應用</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>😊 表情辨識應用</h1>
        <p class="subtitle">讓我看看你今天的心情如何！</p>
        
        <div class="camera-container">
            <video id="video" playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="loading" class="loading">載入中...</div>
        </div>
        
        <div class="controls">
            <button id="startBtn" class="btn btn-primary">開始相機</button>
            <button id="stopBtn" class="btn btn-secondary" disabled>停止相機</button>
        </div>
        
        <div class="info-panel">
            <h2>偵測結果</h2>
            <div id="expressionDisplay" class="expression-display">
                <p class="emoji" id="expressionEmoji">😐</p>
                <p class="text" id="expressionText">等待中...</p>
                <p class="confidence" id="confidence">信心度: --%</p>
            </div>
            
            <h2>語音回饋</h2>
            <div class="voice-controls">
                <button id="repeatBtn" class="btn btn-small" disabled>重複語音</button>
                <button id="speakRateUp" class="btn btn-small">速度+</button>
                <button id="speakRateDown" class="btn btn-small">速度-</button>
            </div>
            <div id="voiceLog" class="voice-log"></div>
        </div>
        
        <div class="info-section">
            <h3>📱 使用說明</h3>
            <ul>
                <li>點擊「開始相機」授予攝影機權限</li>
                <li>對著攝影機，應用會自動偵測您的表情</li>
                <li>根據不同表情，會聽到不同的語音回饋</li>
                <li>按「重複語音」可重新聽取最後一句回饋</li>
                <li>支援調整語音速度</li>
            </ul>
        </div>
    </div>

    <!-- MediaPipe 庫 -->
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
